<!DOCTYPE html>
<html lang="ja">

<head>
<link rel="icon" href="https://raw.githubusercontent.com/Gadget-Otaku/Bookmarklet/refs/heads/main/HTML制作/favicon/メモ帳3.0用favicon.ico" type="image/memo-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メモ帳 3.0</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* 基本レイアウト */
    html, body { height: 100%; margin: 0; padding: 0 18px 18px 18px; box-sizing: border-box; }
    body { display: flex; flex-direction: column; font-family: sans-serif; }
    
    /* タイトルバー & コントロール */
    .header-bar { display: flex; gap: 10px; margin-top: 10px; margin-bottom: 5px; }
    #page-title { flex: 1; padding: 5px; font-weight: bold; border: 1px solid #ccc; }
    
    .controls { flex: 0 0 auto; margin-bottom: 10px; position: relative; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .controls button, .controls input, .controls select { padding: 7px 7px; font-size: 12px; }
    
    /* エディタエリア (レイヤー重ね合わせのため relative 指定) */
    #editor-container { flex: 1; position: relative; border: 1px solid #ccc; overflow: hidden; }

    /* メイン入力欄 (#memo) */
    #memo { 
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; 
      box-sizing: border-box; 
      padding: 10px; 
      overflow: auto; 
      white-space: pre-wrap; 
      font-family: monospace; 
      outline: none;
      z-index: 2; /* 手前 */
      background-color: transparent; /* 重要: 透明 */
      color: inherit;
    }

    /* ハイライト専用レイヤー (#highlight-layer) */
    #highlight-layer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      box-sizing: border-box;
      padding: 10px; /* #memoと合わせる */
      overflow: hidden; /* スクロールはJSで同期 */
      white-space: pre-wrap;
      font-family: monospace;
      z-index: 1; /* 奥 */
      pointer-events: none; /* クリック透過 */
      color: transparent; /* 文字は透明 */
      background-color: #fff; /* エディタ背景色 */
      display: block;
    }

    /* スタイル装飾 */
    /* 検索ヒット用 (レイヤー内) */
    #highlight-layer .highlight { background-color: yellow; color: transparent; }

    /* 変換確認用 (memo内に直接描画) */
    .highlight-change { background-color: cyan; cursor: pointer; } /* 青色マーカー (変更後) */
    .highlight-delete { background-color: #ffcccc; text-decoration: line-through; color: #cc0000; cursor: pointer; } /* 赤色マーカー (削除対象) */
    
    /* ★追加: 無効化されたマーカー (取り消し状態) */
    .highlight-disabled { 
      background-color: #e0e0e0 !important; 
      text-decoration: none !important; 
      color: inherit !important; 
      cursor: pointer;
    }

    /* Ace Editor */
    #code-editor { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; z-index: 10; background: #141414; }
    
    /* 設定パネル */
    #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 320px; height: 100%; background: #f9f9f9; border-right: 1px solid #ccc; z-index: 2000; box-shadow: 2px 0 5px rgba(0,0,0,0.1); padding: 15px; overflow-y: auto; }
    #settings-panel.open { display: block; }
    .panel-header { display: flex; justify-content: flex-end; margin-bottom: 20px; }
    .panel-close { cursor: pointer; font-weight: bold; font-size: 18px; }
    
    /* 確認モード用のボタン群 */
    .preview-btns { display: none; position: fixed; top: 10px; left: 10px; z-index: 3000; }
    .preview-btns button { padding: 10px 15px; font-weight: bold; border: 2px solid #333; cursor: pointer; margin-right: 5px; }
    #expand-btn { background: #fff; }
    #apply-btn { background: #ccffcc; }

    /* メニューボタン等 */
    .menu-btn { width: 100%; padding: 10px; text-align: left; margin-bottom: 5px; cursor: pointer; background: #fff; border: 1px solid #ddd; }
    .menu-btn:hover { background: #eee; }
    .screen { display: none; }
    .screen.active { display: block; }
    .row { margin-bottom: 10px; }
    .row label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 12px; }
    .row input[type="text"], .row input[type="password"] { width: 100%; padding: 5px; box-sizing: border-box; }
    .item-list { border: 1px solid #eee; padding: 5px; max-height: 250px; overflow-y: auto; margin-bottom: 10px; background: #fff; }
    .item { padding: 5px; cursor: pointer; display: flex; align-items: center; border-bottom: 1px solid #f0f0f0; }
    .item:hover { background: #eef; }
    .item.selected { background: #ddf; border-left: 3px solid blue; }
    .folder-icon { color: #dcb028; margin-right: 5px; }
    .memo-icon { color: #555; margin-right: 5px; }
    
    #count { min-width: 40px; text-align: center; display: inline-block; font-size: 12px; }
    .status-msg { font-size: 10px; color: blue; margin-top: 5px; }
    
    /* ドラッグ＆ドロップ用 */
    .dragging { opacity: 0.5; }
    .drop-target { background-color: #e0f7fa; border: 2px dashed #00796b; }
    .drop-hint { position: absolute; background: #00796b; color: white; padding: 2px 5px; border-radius: 3px; font-size: 12px; z-index: 1000; }
    
    /* 変換画面のレイアウト修正 */
    #transform-screen label { display: block; margin-bottom: 5px; }
    #transform-screen input[type="radio"] { margin-right: 5px; }
    /* 無効化時のスタイル */
    .disabled-input { opacity: 0.5; pointer-events: none; }
    
    /* 候補編集画面のレイアウト */
    .candidate-edit-row { display: flex; gap: 5px; margin-bottom: 5px; align-items: center; }
    .candidate-edit-row input { flex: 1; padding: 5px; }
    .candidate-edit-row .candidate-buttons { display: flex; gap: 2px; }
    .temp-memo-separator { border-top: 2px solid #ccc; margin-top: 10px; padding-top: 10px; }
    
    /* 編集画面のレイアウト */
    .edit-controls { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
    .name-edit-row { display: flex; gap: 5px; margin-top: 10px; }
    .name-edit-row input { flex: 1; padding: 5px; }
    .path-label { font-size: 11px; color: #555; margin: -2px 0 8px; word-break: break-all; }
    .action-row { display: flex; gap: 5px; margin: 10px 0; flex-wrap: wrap; }
    .inline-fields { display: flex; gap: 5px; align-items: center; }
    .inline-fields input { flex: 1; }
    .subtle-note { font-size: 11px; color: #666; margin: 4px 0 10px; line-height: 1.5; }
    .section-title { margin: 18px 0 8px; font-size: 15px; }
    .selected-banner { font-size: 11px; color: #444; background: #fff; border: 1px solid #e0e0e0; padding: 8px; margin-bottom: 10px; line-height: 1.5; }
    .tree-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; width: 100%; }
    .tree-item-main { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .tree-item-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-item-meta { font-size: 10px; color: #666; }
    .tree-item-actions { display: flex; gap: 4px; flex-wrap: wrap; }
    .tree-item-actions button { padding: 4px 6px; font-size: 11px; }
    .count-settings-grid { display: grid; grid-template-columns: 1fr 90px; gap: 8px 10px; align-items: center; margin-top: 10px; }
    .count-settings-grid input { width: 100%; padding: 5px; box-sizing: border-box; }
    .counter-note { font-size: 11px; color: #666; line-height: 1.5; margin-top: 10px; }
    .split-copy-btn { width: 100%; text-align: left; padding: 8px; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="header-bar">
    <input type="text" id="page-title" placeholder="タイトル未設定">
  </div>

  <div class="preview-btns" id="preview-controls">
    <button id="expand-btn">⤢ 展開 (キャンセル)</button>
    <button id="apply-btn">レ 確定 (適用)</button>
  </div>

  <div id="settings-panel">
    <div class="panel-header"><span class="panel-close">☒</span></div>
    
    <div id="menu-screen" class="screen active">
      <button class="menu-btn" id="btn-editor-mode">エディタモード オン</button>
      <button class="menu-btn" id="btn-transform">変換</button>
      <button class="menu-btn" id="btn-pc-view">PC表示</button>
      <button class="menu-btn" id="btn-split-copy">分割コピー</button>
      <button class="menu-btn" id="btn-import-export">インポート/エクスポート</button>
      <button class="menu-btn" id="btn-memo-list">メモ一覧</button>
      <button class="menu-btn" id="btn-memo-save">メモ保存</button>
      <hr>
      <div style="font-size:11px; color:#666; margin-bottom:5px;">※API設定は拡張機能で行ってください</div>
      <button class="menu-btn" id="btn-gh-connect">設定再読み込み</button>
      <div id="gh-status" class="status-msg"></div>
    </div>

    <div id="transform-screen" class="screen">
      <button class="back-btn">←戻る</button>
      <h3>変換</h3>
      <label><input type="radio" name="trans-type" value="encode" checked> エンコード</label>
      <label><input type="radio" name="trans-type" value="decode"> デコード</label>
      <label><input type="radio" name="trans-type" value="remove-comment"> コメント削除</label>
      <div style="margin-left:20px;">
        <label id="lbl-one-line"><input type="checkbox" id="chk-one-line"> 1文</label>
      </div>
      <label><input type="radio" name="trans-type" value="custom"> カスタム</label>
      <div class="row" style="margin-top:10px;"><label>変換元</label><input type="text" id="trans-from"></div>
      <div class="row"><label>変換先</label><input type="text" id="trans-to"></div>
      <div style="display:flex; justify-content:space-between; margin-top:15px;">
        <button id="do-transform">変換 (即時)</button>
        <button id="do-confirm-transform">確認</button>
      </div>
    </div>

    <div id="char-count-screen" class="screen">
      <button class="back-btn">←戻る</button>
      <h3>カウントモード</h3>
      <label><input type="radio" name="char-count-mode" value="default"> デフォルト</label>
      <label><input type="radio" name="char-count-mode" value="x-post"> Xポスト用</label>
      <label><input type="radio" name="char-count-mode" value="custom"> カスタマイズ</label>
      <div class="count-settings-grid">
        <label for="char-weight-half">半角文字・半角空欄</label>
        <input type="text" id="char-weight-half" inputmode="decimal">
        <label for="char-weight-full">全角文字・全角空欄</label>
        <input type="text" id="char-weight-full" inputmode="decimal">
        <label for="char-weight-emoji">絵文字</label>
        <input type="text" id="char-weight-emoji" inputmode="decimal">
        <label for="char-weight-newline">改行</label>
        <input type="text" id="char-weight-newline" inputmode="decimal">
      </div>
      <div class="counter-note">
        デフォルトは半角・全角・絵文字・改行をすべて1文字で計算します。<br>
        Xポスト用は半角0.5、全角1、絵文字1、改行0.5、URLは1つごとに11.5で計算し、表示は「現在値/140」になります。
      </div>
    </div>

    <div id="split-copy-screen" class="screen">
      <button class="back-btn">←戻る</button>
      <h3>分割コピー</h3>
      <div class="row">
        <label>分割サイズ（文字数）</label>
        <div class="inline-fields">
          <input type="text" id="split-size" value="19000" inputmode="numeric">
          <button id="do-split-copy">分割</button>
        </div>
      </div>
      <div id="split-copy-results" class="item-list"></div>
    </div>

    <div id="import-export-screen" class="screen">
      <button class="back-btn">←戻る</button>
      <h3>インポート</h3>
      <div class="row"><label>URL</label><input type="text" id="import-url" placeholder="GitHub Raw / リポジトリ / サイトURL"></div>
      <div style="display:flex; justify-content:space-between; margin-bottom:15px; flex-wrap: wrap; gap:5px;">
        <button id="do-import-url">インポート</button>
        <button id="btn-import-file">デバイスから</button>
        <input type="file" id="file-input" style="display:none">
        <button id="btn-candidates">候補</button>
      </div>
      <h3 class="section-title">エクスポート</h3>
      <div class="row"><label>ファイル名</label><input type="text" id="export-name" placeholder="memo"></div>
      <div class="row"><label>拡張子</label><input type="text" id="export-ext" placeholder="txt"></div>
      <button id="do-export-device">デバイスに保存</button>
      <div class="row" style="margin-top:15px;"><label>GitHubリポジトリURL</label><input type="text" id="github-export-url" placeholder="https://github.com/owner/repo/blob/main/path/to/file.html"></div>
      <button id="do-export-github">GitHubに保存</button>
    </div>

    <div id="candidate-list-screen" class="screen">
      <button class="back-btn" data-target="import-export-screen">←戻る</button>
      <button id="candidate-edit-btn" style="float:right;">編集</button>
      <h3>候補一覧</h3>
      <div class="row">
        <div id="candidate-list" class="item-list"></div>
      </div>
    </div>

    <div id="candidate-edit-screen" class="screen">
      <button class="back-btn" data-target="candidate-list-screen">←戻る</button>
      <button id="save-candidates" style="float:right;">保存</button>
      <h3>候補編集</h3>
      <div id="candidate-edit-container">
        </div>
      <div style="display:flex; gap:5px; margin-top:10px;">
        <button id="candidate-add-row">追加</button>
      </div>
    </div>

    <div id="list-screen" class="screen">
      <button class="back-btn">←戻る</button>
      <button id="btn-edit-mode" style="float:right;">整理</button>
      <h3>メモ一覧</h3>
      <div id="memo-list-path" class="path-label"></div>
      <div id="memo-tree-view" class="item-list">Loading...</div>
      <div class="temp-memo-separator">
        <div class="item" id="temp-memo-item">
          <span class="memo-icon">📋️</span> <b>一時メモ</b>
        </div>
      </div>
    </div>

    <div id="list-edit-ui" class="screen">
      <button class="back-btn" data-target="list-screen">←戻る</button>
      <button id="list-save-btn" style="float:right;">保存</button>
      <h3>メモ一覧を整理</h3>
      <div id="memo-edit-path" class="path-label"></div>
      <div id="edit-selection-summary" class="selected-banner">行を押すと名前変更できます。移動は各行の「移動」から始めます。</div>
      <div id="move-pending-summary" class="selected-banner" style="display:none;"></div>
      <div id="memo-tree-edit" class="item-list"></div>
      <div class="action-row">
        <button id="edit-up-folder">上の階層へ</button>
        <button id="edit-move-here" style="display:none;">ここに移動</button>
        <button id="edit-cancel-move" style="display:none;">移動をやめる</button>
        <button id="edit-new-folder">新規フォルダ</button>
      </div>
      <div class="name-edit-row">
        <input type="text" id="edit-name-input" placeholder="名前">
        <button id="edit-rename">名前変更</button>
      </div>
    </div>

    <div id="save-screen" class="screen">
      <button class="back-btn">←戻る</button>
      <h3>メモ保存</h3>
      <div class="row"><label>タイトル名</label><input type="text" id="save-title"></div>
      <div class="row"><label>保存先フォルダを選択</label>
        <div id="save-path-label" class="path-label"></div>
        <div id="save-tree-view" class="item-list"></div>
        <div class="action-row">
          <button id="save-up-folder">上の階層へ</button>
          <button id="save-new-folder">新規フォルダ</button>
        </div>
      </div>
      <div style="display:flex; justify-content:space-between;">
        <button id="do-save-memo">保存</button>
        <button id="do-save-temp">一時保存</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <button id="settings-btn">⚙️</button>
    <button id="undo">←</button>
    <button id="redo">→</button>
    <button id="clear">クリア</button>
    <button id="copy">コピー</button>
    <input id="search" type="text" placeholder="🔎 キーワード検索">
    <button id="prev"><</button>
    <span id="count">0/0</span>
    <button id="next">></button>
    <input id="prefix" type="text" placeholder="始め">
    <input id="suffix" type="text" placeholder="終わり">
    <button id="add-prefix-suffix">追加</button>
    
    <select id="exec-type">
      <option value="js">JavaScript</option>
      <option value="html">HTML</option>
      <option value="md">Markdown</option>
      <option value="svg">SVG</option>
    </select>
    <button id="do-exec">実行</button>
    <button id="open-url">＋</button>
    <button id="char-count-btn" title="文字数">0</button>
  </div>

  <div id="editor-container">
    <div id="highlight-layer"></div>
    <div id="memo" contenteditable="true"></div>
    <div id="code-editor"></div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  /* -------------------------------------------------------------------------- */
  /* 初期化 & エディタ                                 */
  /* -------------------------------------------------------------------------- */
  const memo = document.getElementById('memo');
  const highlightLayer = document.getElementById('highlight-layer');
  const editorDiv = document.getElementById('code-editor');
  const titleInput = document.getElementById('page-title');
  const panel = document.getElementById('settings-panel');
  const screens = document.querySelectorAll('.screen');
  const previewControls = document.getElementById('preview-controls');
  const expandBtn = document.getElementById('expand-btn');
  let aceEditor = null;
  let isEditorMode = false;
  let history = [''];
  let currentStep = 0;
  const graphemeSegmenter = typeof Intl !== 'undefined' && Intl.Segmenter
    ? new Intl.Segmenter('ja', { granularity: 'grapheme' })
    : null;
  const CHAR_COUNT_STORAGE_KEY = 'memo3_char_count_settings';
  const LAST_GITHUB_EXPORT_URL_KEY = 'memo3_last_github_export_url';
  const LAST_SPLIT_SIZE_KEY = 'memo3_last_split_size';
  const DEFAULT_MEMO_DATA_BLOB_URL = 'https://github.com/Gadget-Otaku/Bookmarklet/blob/main/memo_data.json';
  const DEFAULT_CHAR_COUNT_SETTINGS = {
    mode: 'default',
    custom: { halfWidth: 1, fullWidth: 1, emoji: 1, newline: 1 }
  };
  const X_POST_COUNT_SETTINGS = { halfWidth: 0.5, fullWidth: 1, emoji: 1, newline: 0.5, url: 11.5 };
  let charCountSettings = loadCharCountSettings();

  titleInput.addEventListener('input', () => {
    document.title = titleInput.value || "メモ帳 3.0";
  });

  document.getElementById('split-size').value = localStorage.getItem(LAST_SPLIT_SIZE_KEY) || '19000';
  document.getElementById('github-export-url').value = localStorage.getItem(LAST_GITHUB_EXPORT_URL_KEY) || '';

  function loadCharCountSettings() {
    try {
      const raw = localStorage.getItem(CHAR_COUNT_STORAGE_KEY);
      if (!raw) return JSON.parse(JSON.stringify(DEFAULT_CHAR_COUNT_SETTINGS));
      const parsed = JSON.parse(raw);
      return {
        mode: ['default', 'x-post', 'custom'].includes(parsed.mode) ? parsed.mode : 'default',
        custom: {
          halfWidth: normalizeWeight(parsed?.custom?.halfWidth, 1),
          fullWidth: normalizeWeight(parsed?.custom?.fullWidth, 1),
          emoji: normalizeWeight(parsed?.custom?.emoji, 1),
          newline: normalizeWeight(parsed?.custom?.newline, 1)
        }
      };
    } catch (e) {
      return JSON.parse(JSON.stringify(DEFAULT_CHAR_COUNT_SETTINGS));
    }
  }

  function normalizeWeight(value, fallback) {
    const num = Number(value);
    return Number.isFinite(num) && num >= 0 ? num : fallback;
  }

  function persistCharCountSettings() {
    localStorage.setItem(CHAR_COUNT_STORAGE_KEY, JSON.stringify(charCountSettings));
  }

  function getActiveCountWeights() {
    if (charCountSettings.mode === 'x-post') return X_POST_COUNT_SETTINGS;
    if (charCountSettings.mode === 'custom') return charCountSettings.custom;
    return DEFAULT_CHAR_COUNT_SETTINGS.custom;
  }

  function getGraphemeSegments(text) {
    if (!text) return [];
    if (graphemeSegmenter) {
      return Array.from(graphemeSegmenter.segment(text), ({ segment, index }) => ({ segment, index }));
    }
    let cursor = 0;
    return Array.from(text).map((segment) => {
      const item = { segment, index: cursor };
      cursor += segment.length;
      return item;
    });
  }

  function isEmojiSegment(segment) {
    return /\p{Extended_Pictographic}/u.test(segment)
      || /\p{Regional_Indicator}/u.test(segment)
      || /[\u200D\uFE0F\u20E3]/u.test(segment);
  }

  function isHalfWidthSegment(segment) {
    return /^[\u0000-\u00FF\uFF61-\uFF9F]+$/u.test(segment);
  }

  function calculateCharCount(text) {
    const source = (text || '').replace(/\r\n/g, '\n');
    const weights = getActiveCountWeights();
    const segments = getGraphemeSegments(source);
    const urlPattern = /(?:https?:\/\/|www\.)[^\s]+/iy;
    let total = 0;

    for (let i = 0; i < segments.length; i++) {
      const { segment, index } = segments[i];

      if (weights.url != null) {
        urlPattern.lastIndex = index;
        const match = urlPattern.exec(source);
        if (match && match.index === index) {
          total += weights.url;
          const urlEnd = index + match[0].length;
          while (i + 1 < segments.length && segments[i + 1].index < urlEnd) i++;
          continue;
        }
      }

      if (segment === '\n' || segment === '\r' || segment === '\r\n') {
        total += weights.newline;
      } else if (isEmojiSegment(segment)) {
        total += weights.emoji;
      } else if (isHalfWidthSegment(segment)) {
        total += weights.halfWidth;
      } else {
        total += weights.fullWidth;
      }
    }
    return total;
  }

  function formatCountValue(value) {
    return Number.isInteger(value) ? String(value) : String(Number(value.toFixed(2)));
  }

  function updateCharCountDisplay(text = getText()) {

  function insertPlainTextAtCursor(text) {
    memo.focus();
    try {
      if (document.queryCommandSupported && document.queryCommandSupported('insertText')) {
        if (document.execCommand('insertText', false, text)) return;
      }
    } catch (e) {}

    const selection = window.getSelection();
    if (!selection || !selection.rangeCount) {
      memo.appendChild(document.createTextNode(text));
      return;
    }
    const range = selection.getRangeAt(0);
    if (!memo.contains(range.commonAncestorContainer)) {
      memo.appendChild(document.createTextNode(text));
      return;
    }
    range.deleteContents();
    const textNode = document.createTextNode(text);
    range.insertNode(textNode);
    range.setStartAfter(textNode);
    range.collapse(true);
    selection.removeAllRanges();
    selection.addRange(range);
  }

  /* -------------------------------------------------------------------------- */
  /* 拡張機能連携                                    */
  /* -------------------------------------------------------------------------- */
  let ghConfig = null;
  let currentGitHubData = null; 
  let currentSha = null;

  function normalizeMemoNodes(nodes) {
    return (Array.isArray(nodes) ? nodes : []).map((node) => {
      if (!node || typeof node !== 'object') return null;
      if (node.type === 'folder' || Array.isArray(node.children)) {
        return {
          type: 'folder',
          name: String(node.name || '新しいフォルダ'),
          children: normalizeMemoNodes(node.children)
        };
      }
      return {
        type: 'memo',
        name: String(node.name || '新しいメモ'),
        content: String(node.content ?? '')
      };
    }).filter(Boolean);
  }

  function normalizeMemoData(data) {
    const normalized = data && typeof data === 'object' ? data : {};
    normalized.folders = normalizeMemoNodes(normalized.folders);
    normalized.candidates = Array.isArray(normalized.candidates)
      ? normalized.candidates.map((candidate) => ({
          name: String(candidate?.name || ''),
          url: String(candidate?.url || '')
        }))
      : [];
    normalized.tempMemo = typeof normalized.tempMemo === 'string' ? normalized.tempMemo : '';
    return normalized;
  }

  function encodeGitHubPath(path) {
    return path.split('/').map(part => encodeURIComponent(part)).join('/');
  }

  function buildGitHubContentsUrl(owner, repo, path, branch) {
    const base = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeGitHubPath(path)}`;
    return branch ? `${base}?ref=${encodeURIComponent(branch)}` : base;
  }

  function parseGitHubBlobUrl(url) {
    try {
      const parsedUrl = new URL(url);
      if (parsedUrl.hostname !== 'github.com') return null;
      const parts = parsedUrl.pathname.split('/').filter(Boolean).map(part => decodeURIComponent(part));
      if (parts.length < 5 || parts[2] !== 'blob') return null;
      const [owner, repo, , branch, ...pathParts] = parts;
      if (!owner || !repo || !branch || pathParts.length === 0) return null;
      return { owner, repo, branch, path: pathParts.join('/') };
    } catch (e) {
      return null;
    }
  }

  function encodeBase64Utf8(text) {
    return btoa(unescape(encodeURIComponent(text)));
  }

  function sendExtMessage(payload) {
    return new Promise((resolve, reject) => {
      const id = Date.now() + Math.random();
      let handled = false;
      const handler = (e) => {
        if (e.data && e.data.source === 'MEMO_EXTENSION' && e.data.id === id) {
          window.removeEventListener('message', handler);
          handled = true;
          resolve(e.data.payload);
        }
      };
      window.addEventListener('message', handler);
      window.postMessage({ source: 'MEMO_TOOL_V3', id, payload }, "*");
      setTimeout(() => {
        if (!handled) { window.removeEventListener('message', handler); reject('EXTENSION_TIMEOUT'); }
      }, 3000);
    });
  }

  async function loadGhSettingsFromExt() {
    try {
      const res = await sendExtMessage({ type: 'GET_SETTINGS' });
      const stat = document.getElementById('gh-status');
      if (res && res.githubToken) {
        ghConfig = { token: res.githubToken };
        const match = (res.repoUrl || '').match(/github\.com\/([^\/]+)\/([^\/]+)/);
        if (match && res.fileName) {
          ghConfig.owner = match[1];
          ghConfig.repo = match[2].replace(/(\.git)+$/, '').replace(/#.*$/, '');
          ghConfig.filename = res.fileName;
          stat.textContent = "拡張機能の設定を読み込みました";
          stat.style.color = "green";
        } else {
          const defaultTarget = parseGitHubBlobUrl(DEFAULT_MEMO_DATA_BLOB_URL);
          if (defaultTarget) {
            ghConfig.owner = defaultTarget.owner;
            ghConfig.repo = defaultTarget.repo;
            ghConfig.filename = defaultTarget.path;
            stat.textContent = "トークンを読み込みました。既定の memo_data.json を同期先に使います";
            stat.style.color = "orange";
          } else {
            stat.textContent = "トークンを読み込みました。メモ同期先は拡張機能で設定してください";
            stat.style.color = "orange";
          }
        }
      } else {
        stat.textContent = "拡張機能で設定を行ってください";
        stat.style.color = "red";
      }
    } catch(e) {
      const stat = document.getElementById('gh-status');
      if(stat) {
        stat.textContent = "拡張機能が見つかりません (アクセス許可を確認)";
        stat.style.color = "red";
      }
    }
  }
  
  loadGhSettingsFromExt();
  document.getElementById('btn-gh-connect').onclick = loadGhSettingsFromExt;

  /* -------------------------------------------------------------------------- */
  /* データ操作 (Fetch / Save)                        */
  /* -------------------------------------------------------------------------- */
  async function fetchGitHubData() {
    if (!ghConfig?.token) {
      await loadGhSettingsFromExt();
    }
    if (!ghConfig?.token || !ghConfig?.owner || !ghConfig?.repo || !ghConfig?.filename) {
      alert('メモ同期用のGitHub設定がありません');
      return false;
    }
    const url = buildGitHubContentsUrl(ghConfig.owner, ghConfig.repo, ghConfig.filename);
    
    try {
      const res = await sendExtMessage({ type: 'GITHUB_FETCH', url: url, token: ghConfig.token });
      if (res.ok || res.success) {
        currentSha = res.data.sha;
        const content = decodeURIComponent(escape(atob(res.data.content)));
        currentGitHubData = normalizeMemoData(JSON.parse(content));
        return true;
      } else {
        alert('データ取得エラー: ' + (res.data?.message || res.error || res.status));
        return false;
      }
    } catch(e) { alert("通信エラー: " + e); return false; }
  }

  async function saveToGitHub(msg) {
    if (!ghConfig?.token || !ghConfig?.owner || !ghConfig?.repo || !ghConfig?.filename || !currentGitHubData) return false;
    const url = buildGitHubContentsUrl(ghConfig.owner, ghConfig.repo, ghConfig.filename);
    const content = encodeBase64Utf8(JSON.stringify(currentGitHubData, null, 2));
    
    const res = await sendExtMessage({
      type: 'GITHUB_FETCH', method: 'PUT', url: url, token: ghConfig.token,
      body: { message: msg, content: content, sha: currentSha }
    });
    
    if (res.ok || res.success) {
      currentSha = res.data.content.sha;
      return true;
    } else {
      alert('保存エラー: ' + (res.data?.message || res.error || res.status));
      return false;
    }
  }

  async function saveTextToGitHubUrl(targetUrl, text) {
    if (!ghConfig?.token) {
      await loadGhSettingsFromExt();
    }
    if (!ghConfig?.token) {
      alert('GitHub保存には拡張機能のトークン設定が必要です');
      return false;
    }

    const target = parseGitHubBlobUrl(targetUrl);
    if (!target) {
      alert('GitHubリポジトリURLは https://github.com/owner/repo/blob/branch/path/file.ext の形式で入力してください');
      return false;
    }

    localStorage.setItem(LAST_GITHUB_EXPORT_URL_KEY, targetUrl);
    const apiUrl = buildGitHubContentsUrl(target.owner, target.repo, target.path, target.branch);
    let sha = null;

    const fetchRes = await sendExtMessage({ type: 'GITHUB_FETCH', url: apiUrl, token: ghConfig.token });
    if (fetchRes.ok || fetchRes.success) {
      sha = fetchRes.data?.sha || null;
    } else if (fetchRes.status !== 404) {
      alert('GitHub保存先の確認に失敗しました: ' + (fetchRes.data?.message || fetchRes.error || fetchRes.status));
      return false;
    }

    const saveRes = await sendExtMessage({
      type: 'GITHUB_FETCH',
      method: 'PUT',
      url: buildGitHubContentsUrl(target.owner, target.repo, target.path),
      token: ghConfig.token,
      body: {
        message: `Update ${target.path} from メモ帳 3.0`,
        content: encodeBase64Utf8(text),
        branch: target.branch,
        ...(sha ? { sha } : {})
      }
    });

    if (saveRes.ok || saveRes.success) {
      return true;
    }

    alert('GitHub保存エラー: ' + (saveRes.data?.message || saveRes.error || saveRes.status));
    return false;
  }

  /* -------------------------------------------------------------------------- */
  /* キーワード検索機能 (オーバーレイ方式)                  */
  /* -------------------------------------------------------------------------- */
  let searchIndex = 0;
  let searchMatches = [];
  let aceSearchResults = [];
  const searchInput = document.getElementById('search');
  let isComposing = false;

  memo.addEventListener('scroll', () => {
    highlightLayer.scrollTop = memo.scrollTop;
    highlightLayer.scrollLeft = memo.scrollLeft;
  });

  memo.addEventListener('input', () => {
    if (!memo.isContentEditable) return;
    updateHistory(memo.innerText);
    if (searchInput.value && !isComposing) updateHighlights();
  });

  searchInput.addEventListener('compositionstart', () => { isComposing = true; });
  searchInput.addEventListener('compositionend', () => { isComposing = false; searchInput.dispatchEvent(new Event('input')); });

  searchInput.addEventListener('input', () => {
    if (isComposing) return;
    searchIndex = 0;
    
    if (isEditorMode && aceEditor) {
      execAceSearch();
    } else {
      updateHighlights();
    }
  });

  function updateHighlights() {
    const searchTerm = searchInput.value;
    const text = memo.innerText;
    
    if (!searchTerm) {
      highlightLayer.innerHTML = '';
      document.getElementById('count').textContent = '0/0';
      searchMatches = [];
      return;
    }

    const escapedText = escapeHTML(text);
    const escapedTerm = escapeHTML(searchTerm); 
    const regex = new RegExp(escapeRegExp(escapedTerm), 'gi');
    
    let matchCount = 0;
    const html = escapedText.replace(regex, (match) => {
      matchCount++;
      return `<span class="highlight">${match}</span>`;
    });

    highlightLayer.innerHTML = html;
    searchMatches = highlightLayer.querySelectorAll('.highlight');
    document.getElementById('count').textContent = matchCount > 0 ? `1/${matchCount}` : '0/0';

    if (matchCount > 0) scrollToCurrentMatch();
  }

  function execAceSearch() {
    aceSearchResults = [];
    const searchTerm = searchInput.value;
    if (!searchTerm) {
      document.getElementById('count').textContent = '0/0';
      return;
    }
    const text = aceEditor.getValue();
    const regex = new RegExp(escapeRegExp(searchTerm), 'gi');
    let match;
    while ((match = regex.exec(text)) !== null) {
      aceSearchResults.push(match.index);
    }
    document.getElementById('count').textContent = aceSearchResults.length > 0 ? `1/${aceSearchResults.length}` : '0/0';
    if(aceSearchResults.length > 0) scrollToCurrentAceMatch();
  }

  document.getElementById('next').addEventListener('click', () => {
    if (isEditorMode) {
        if(aceSearchResults.length === 0) return;
        searchIndex = (searchIndex + 1) % aceSearchResults.length;
        scrollToCurrentAceMatch();
    } else {
        if (searchMatches.length === 0) return;
        searchIndex = (searchIndex + 1) % searchMatches.length;
        scrollToCurrentMatch();
    }
    updateCountLabel();
  });

  document.getElementById('prev').addEventListener('click', () => {
    if (isEditorMode) {
        if(aceSearchResults.length === 0) return;
        searchIndex = (searchIndex - 1 + aceSearchResults.length) % aceSearchResults.length;
        scrollToCurrentAceMatch();
    } else {
        if (searchMatches.length === 0) return;
        searchIndex = (searchIndex - 1 + searchMatches.length) % searchMatches.length;
        scrollToCurrentMatch();
    }
    updateCountLabel();
  });

  function updateCountLabel() {
    const len = isEditorMode ? aceSearchResults.length : searchMatches.length;
    if(len > 0) document.getElementById('count').textContent = `${searchIndex + 1}/${len}`;
  }

  function scrollToCurrentMatch() {
    const target = searchMatches[searchIndex];
    if (target) {
      const layerRect = highlightLayer.getBoundingClientRect();
      const targetRect = target.getBoundingClientRect();
      const relativeTop = targetRect.top - layerRect.top;
      memo.scrollTop = relativeTop + memo.scrollTop - (memo.clientHeight / 2);
    }
  }

  function scrollToCurrentAceMatch() {
    if(aceEditor && aceSearchResults[searchIndex] !== undefined) {
       const pos = aceEditor.session.doc.indexToPosition(aceSearchResults[searchIndex]);
       aceEditor.selection.moveToPosition(pos);
       aceEditor.centerSelection();
    }
  }

  document.getElementById('add-prefix-suffix').addEventListener('click', () => {
    const prefix = document.getElementById('prefix').value || "";
    const suffix = document.getElementById('suffix').value || "";
    const beforeText = getText();
    if (history[currentStep] !== beforeText) updateHistory(beforeText);

    if (isEditorMode && aceEditor) {
      const range = aceEditor.getSelectionRange();
      const doc = aceEditor.session.getDocument();
      for (let r = range.start.row; r <= range.end.row; r++) {
        let line = doc.getLine(r);
        aceEditor.session.replace(new ace.Range(r, 0, r, line.length), prefix + line + suffix);
      }
    } else {
      const sel = window.getSelection();
      let textToReplace = "";
      let range = null;

      if (sel.rangeCount && !sel.isCollapsed && memo.contains(sel.anchorNode)) {
        range = sel.getRangeAt(0);
        textToReplace = sel.toString();
      } else {
        textToReplace = memo.innerText;
      }

      if (textToReplace) {
        const lines = textToReplace.split(/\r?\n/);
        const newTextSegment = lines.map(line => prefix + line + suffix).join('\n');
        
        if (range) {
          range.deleteContents();
          range.insertNode(document.createTextNode(newTextSegment));
        } else {
          memo.innerText = newTextSegment;
        }
      }
    }
    updateHistory(getText());
    if(document.getElementById('search').value) updateHighlights();
  });

  document.getElementById('copy').addEventListener('click', () => {
    const text = getText();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(err => execCopyFallback(text));
    } else {
      execCopyFallback(text);
    }
  });

  function execCopyFallback(text) {
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  }

  /* -------------------------------------------------------------------------- */
  /* 変換機能: コメント検出・確認・適用                                */
  /* -------------------------------------------------------------------------- */
  document.getElementById('do-transform').onclick = () => executeTransform(false);
  document.getElementById('do-confirm-transform').onclick = () => executeTransform(true);
  
  let originalContent = null;
  // インタラクティブな変更のために、spanタグのクリックイベントをグローバルに定義
  window.toggleHighlight = function(el) {
    el.classList.toggle('highlight-disabled');
  };

  function processComments(text, mode, removeNewlines) {
    let output = "";
    let i = 0;
    const len = text.length;

    const append = (str, isDeleted) => {
      if (mode === 'strip') {
        if (!isDeleted) output += str;
      } else {
        // markモード: 削除対象をspanで囲む (onclick付与)
        if (isDeleted) output += `<span class="highlight-delete" onclick="toggleHighlight(this)">${escapeHTML(str)}</span>`;
        else output += escapeHTML(str);
      }
    };

    while (i < len) {
      let isStartOfElement = (i === 0) || (['\n', '\r', ' ', '\t'].includes(text[i-1]));

      // 1. UserScript ブロックの保護
      if (isStartOfElement && text.startsWith("// ==UserScript==", i)) {
        let closeTag = "// ==/UserScript==";
        let endIdx = text.indexOf(closeTag, i + 17);
        if (endIdx === -1) {
           closeTag = "// ==UserScript==";
           endIdx = text.indexOf(closeTag, i + 17);
        }
        if (endIdx !== -1) {
          let contentEnd = endIdx + closeTag.length;
          let content = text.substring(i, contentEnd);
          append(content, false);
          i = contentEnd;
          continue;
        }
      }

      // 2. ブロックコメント /* ... */
      if (isStartOfElement && text.startsWith("/*", i)) {
        let endIdx = text.indexOf("*/", i + 2);
        if (endIdx !== -1) {
          let content = text.substring(i, endIdx + 2);
          append(content, true);
          i = endIdx + 2;
          continue;
        }
      }

      // 3. 行コメント //
      if (isStartOfElement && text.startsWith("//", i)) {
          let eol = text.indexOf("\n", i);
          if (eol === -1) eol = len;
          let content = text.substring(i, eol);
          append(content, true);
          i = eol;
          continue;
      }

      // 4. 改行削除（1文モード）
      // コメント削除時の1文チェックはここで処理
      if (removeNewlines && (text[i] === '\n' || text[i] === '\r')) {
          if (mode === 'mark') {
             append(text[i] === '\r' ? '' : '↵\n', true);
          }
          i++;
          continue;
      }

      // 通常文字
      append(text[i], false);
      i++;
    }
    return output;
  }

  function executeTransform(isConfirm) {
    const type = document.querySelector('input[name="trans-type"]:checked').value;
    const isOneLine = document.getElementById('chk-one-line').checked && !document.getElementById('chk-one-line').disabled;
    const customFrom = document.getElementById('trans-from').value;
    const customTo = document.getElementById('trans-to').value;
    const currentText = getText();
    let result = currentText;

    // 即時実行のロジック
    if (!isConfirm) {
      if (type === 'encode') result = encodeURIComponent(currentText);
      else if (type === 'decode') result = decodeURIComponent(currentText);
      else if (type === 'remove-comment') {
        result = processComments(currentText, 'strip', isOneLine);
      } else if (type === 'custom') {
        if(customFrom) result = currentText.split(customFrom).join(customTo);
      }
      // 1文チェックがコメント削除以外なら後処理（要件通りUI制御したが一応）
      if (type !== 'remove-comment' && isOneLine) {
          // ※UI制御でコメント削除以外は1文チェックできないようにしたが、
          // 万が一の場合はここを通る可能性あり。ただ要件的にはコメント削除時のみ。
      }
      setText(result);
      updateHistory(result);
      return;
    }

    // --- 確認モード (プレビュー) ---
    originalContent = currentText;
    panel.classList.remove('open');
    previewControls.style.display = 'block'; // ボタン表示
    highlightLayer.style.display = 'none';

    if(isEditorMode && aceEditor) {
      // Aceの場合は簡易表示のみ（クリック操作は非対応）
      // ロジック計算して表示
      if (type === 'encode') result = encodeURIComponent(currentText);
      else if (type === 'decode') result = decodeURIComponent(currentText);
      else if (type === 'remove-comment') result = processComments(currentText, 'strip', isOneLine);
      else if (type === 'custom' && customFrom) result = currentText.split(customFrom).join(customTo);
      aceEditor.setValue(result, -1); aceEditor.setReadOnly(true);
    } else {
      memo.contentEditable = false;
      memo.style.backgroundColor = "#eef";

      // プレビューHTMLの生成 (onclick付与)
      if (type === 'remove-comment') {
          memo.innerHTML = processComments(currentText, 'mark', isOneLine);
      } 
      else if (type === 'custom' && !customTo && customFrom) {
           // カスタム削除
           let tempHtml = escapeHTML(currentText);
           const safeFrom = escapeRegExp(customFrom);
           // 削除箇所を赤く
           tempHtml = tempHtml.replace(new RegExp(safeFrom, 'g'), `<span class="highlight-delete" onclick="toggleHighlight(this)">$&</span>`);
           memo.innerHTML = tempHtml;
      } 
      else if (type === 'custom' && customFrom) {
           // 置換 (青マーカー) - 変換後を表示し、元データをdata属性に持つ
           const parts = currentText.split(customFrom);
           const safeTo = escapeHTML(customTo);
           const safeFrom = escapeHTML(customFrom);
           // 青マーカーには data-original を付与してクリック時に元に戻せるようにする...
           // というより、disable時は元テキストに戻すロジックが必要。
           // 青マーカー：表示はNewText。無効化時はOldTextに戻す。
           memo.innerHTML = parts.map(p => escapeHTML(p)).join(`<span class="highlight-change" data-original="${safeFrom}" onclick="toggleHighlight(this)">${safeTo}</span>`);
      } else {
           // 全体変換系
           const safeResult = escapeHTML(type === 'encode' ? encodeURIComponent(currentText) : decodeURIComponent(currentText));
           const safeOriginal = escapeHTML(currentText);
           if (currentText !== safeResult) {
              memo.innerHTML = `<span class="highlight-change" data-original="${safeOriginal}" onclick="toggleHighlight(this)">${safeResult}</span>`;
           } else {
              memo.innerHTML = safeResult;
           }
      }
    }
  }

  // 適用ボタンの処理
  document.getElementById('apply-btn').onclick = () => {
    // 現在のmemo内のHTMLを解析して結果文字列を構築
    let finalString = "";
    
    // #memo の子ノードを走査
    const nodes = memo.childNodes;
    nodes.forEach(node => {
      if (node.nodeType === Node.TEXT_NODE) {
        finalString += node.textContent;
      } else if (node.nodeType === Node.ELEMENT_NODE && node.tagName === 'SPAN') {
        const isDisabled = node.classList.contains('highlight-disabled');
        
        if (node.classList.contains('highlight-delete')) {
          // 赤マーカー: 有効なら削除(追加しない)、無効なら元のテキスト(innerText)を追加
          if (isDisabled) {
            finalString += node.innerText;
          }
        } else if (node.classList.contains('highlight-change')) {
          // 青マーカー: 有効なら今のテキスト(innerText=変換後)、無効なら元のテキスト(data-original)
          if (isDisabled) {
             finalString += (node.getAttribute('data-original') || node.innerText);
          } else {
             finalString += node.innerText;
          }
        } else {
          // その他のspan
          finalString += node.innerText;
        }
      }
    });

    // 確定処理
    resetPreviewState();
    setText(finalString);
    updateHistory(finalString);
  };

  // 展開(キャンセル)ボタン
  expandBtn.onclick = () => {

      resetPreviewState();
    }

  function resetPreviewState() {
    originalContent = null;
    memo.contentEditable = true;
    memo.style.backgroundColor = "";

  /* -------------------------------------------------------------------------- */
  /* インポート / エクスポート / 候補                  */

  const treeState = {
    viewPath: [],
    editPath: [],
    savePath: []
  };
  let editSelection = null;
  let pendingMove = null;

  function pathToLabel(path) {
    return path.length ? `/${path.join('/')}` : '/';
  }

  function openTextInEditor(text, title = '') {
    const value = text || '';
    setText(value);
    updateHistory(value);
    titleInput.value = title;
    document.title = title || "メモ帳 3.0";
    closePanel();
  }

  function getFolder(root, path) {
    let target = { children: root };
    for (const name of path) {
      if (!Array.isArray(target.children)) return null;
      target = target.children.find(node => node.type === 'folder' && node.name === name);
      if (!target) return null;
    }
    if (!Array.isArray(target.children)) target.children = [];
    return target;
  }

  function getChildren(root, path) {
    const folder = getFolder(root, path);
    return folder ? folder.children : [];
  }

  function cloneNode(node) {
    return JSON.parse(JSON.stringify(node));
  }

  function makeUniqueName(children, desiredName, ignoreNode = null) {
    const base = (desiredName || '').trim() || '新しい項目';
    let candidate = base;
    let suffix = 2;
    while (children.some(item => item !== ignoreNode && item.name === candidate)) {
      candidate = `${base} (${suffix})`;
      suffix++;
    }
    return candidate;
  }

  function createCopyName(children, name) {
    return makeUniqueName(children, `${name} - コピー`);
  }

  function createTreeItem({ iconClass, iconText, title, meta = '', onMainClick, actions = [], selected = false }) {
    const item = document.createElement('div');
    item.className = 'item';
    if (selected) item.classList.add('selected');

    const row = document.createElement('div');
    row.className = 'tree-row';

    const main = document.createElement('div');
    main.className = 'tree-item-main';
    if (onMainClick) main.addEventListener('click', onMainClick);

    const icon = document.createElement('span');
    icon.className = iconClass;
    icon.textContent = iconText;

    const textBox = document.createElement('div');
    const titleEl = document.createElement('div');
    titleEl.className = 'tree-item-title';
    titleEl.textContent = title;
    textBox.appendChild(titleEl);

    if (meta) {
      const metaEl = document.createElement('div');
      metaEl.className = 'tree-item-meta';
      metaEl.textContent = meta;
      textBox.appendChild(metaEl);
    }

    main.appendChild(icon);
    main.appendChild(textBox);
    row.appendChild(main);

    if (actions.length > 0) {
      const actionBox = document.createElement('div');
      actionBox.className = 'tree-item-actions';
      actions.forEach(({ label, onClick }) => {
        const button = document.createElement('button');
        button.textContent = label;
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          onClick();
        });
        actionBox.appendChild(button);
      });
      row.appendChild(actionBox);
    }

    item.appendChild(row);
    return item;
  }

  document.getElementById('btn-import-file').onclick = () => document.getElementById('file-input').click();
  document.getElementById('file-input').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const text = String(reader.result || '');
      setText(text);
      updateHistory(text);
      document.getElementById('import-url').value = file.name;
      e.target.value = '';
      closePanel();
    };
    reader.readAsText(file);
  };

  async function importTextFromUrl(url) {
    const rawUrl = (url || '').trim();
    if (!rawUrl) {
      alert('URLを入力してください');
      return false;
    }
    let targetUrl = rawUrl;
    if (rawUrl.includes('github.com') && rawUrl.includes('/blob/')) {
      targetUrl = rawUrl.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
    }
    try {
      const res = await sendExtMessage({ type: 'FETCH_URL', url: targetUrl });
      if (res.success) {
        const text = String(res.text || '');
        setText(text);
        updateHistory(text);
        closePanel();
        return true;
      }
      alert('失敗: ' + res.error);
    } catch (e) {
      alert('拡張機能エラー: ' + e);
    }
    return false;
  }

  document.getElementById('do-import-url').onclick = async () => {
    await importTextFromUrl(document.getElementById('import-url').value);
  };

  document.getElementById('do-export-device').onclick = () => {
    const name = document.getElementById('export-name').value || "memo";
    const ext = document.getElementById('export-ext').value || "txt";
    const blob = new Blob([getText()], { type: 'text/plain' });
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);
    a.href = url;
    a.download = `${name}.${ext}`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    closePanel();
  };

  document.getElementById('do-export-github').onclick = async () => {
    const targetUrl = document.getElementById('github-export-url').value.trim();
    if (!targetUrl) {
      alert('GitHubリポジトリURLを入力してください');
      return;
    }
    if (await saveTextToGitHubUrl(targetUrl, getText())) {
      alert('GitHubに保存しました');
      closePanel();
    }
  };

  /* 候補機能 */
  function renderCandidates() {
    const list = document.getElementById('candidate-list');
    list.innerHTML = '';
    const candidates = currentGitHubData?.candidates || [];
    if (candidates.length === 0) {
      list.textContent = '候補がありません。編集から追加してください。';
      return;
    }
    candidates.forEach((candidate, index) => {
      const label = candidate.name.trim() || `候補 ${index + 1}`;
      list.appendChild(createTreeItem({
        iconClass: 'memo-icon',
        iconText: '📄',
        title: label,
        meta: candidate.url,
        onMainClick: () => importTextFromUrl(candidate.url)
      }));
    });
  }

  document.getElementById('btn-candidates').onclick = async () => {
    if (await fetchGitHubData()) {
      renderCandidates();
      showScreen('candidate-list-screen');
    }
  };

  document.getElementById('candidate-edit-btn').onclick = () => {
    renderCandidateEdit();
    showScreen('candidate-edit-screen');
  };

  function renderCandidateEdit() {
      const container = document.getElementById('candidate-edit-container');
      container.innerHTML = '';
      (currentGitHubData.candidates || []).forEach((c, i) => {
        const row = document.createElement('div');
        row.className = 'candidate-edit-row';
        row.innerHTML = `
          <input type="text" class="cand-name" value="${escapeHTML(c.name)}" placeholder="候補名">
          <input type="text" class="cand-url" value="${escapeHTML(c.url)}" placeholder="URL">
          <div class="candidate-buttons">
            <button class="cand-up" data-index="${i}">↑</button>
            <button class="cand-down" data-index="${i}">↓</button>
            <button class="cand-del" data-index="${i}">削除</button>
          </div>
        `;
        container.appendChild(row);
      });
      
      container.querySelectorAll('.cand-up').forEach(btn => {
        btn.onclick = (e) => {
          const index = parseInt(e.target.dataset.index);
          if (index > 0) {
            const arr = currentGitHubData.candidates;
            [arr[index], arr[index-1]] = [arr[index-1], arr[index]];
            renderCandidateEdit();
          }
        };
      });
      
      container.querySelectorAll('.cand-down').forEach(btn => {
        btn.onclick = (e) => {
          const index = parseInt(e.target.dataset.index);
          if (index < currentGitHubData.candidates.length - 1) {
            const arr = currentGitHubData.candidates;
            [arr[index], arr[index+1]] = [arr[index+1], arr[index]];
            renderCandidateEdit();
          }
        };
      });
      
      container.querySelectorAll('.cand-del').forEach(btn => {
        btn.onclick = (e) => {
          const index = parseInt(e.target.dataset.index);
          currentGitHubData.candidates.splice(index, 1);
          renderCandidateEdit();
        };
      });
  }

  document.getElementById('candidate-add-row').onclick = () => {
    if (!currentGitHubData.candidates) currentGitHubData.candidates = [];
    currentGitHubData.candidates.push({ name: '', url: '' });
    renderCandidateEdit();
  };

  document.getElementById('save-candidates').onclick = async () => {
    const rows = document.querySelectorAll('#candidate-edit-container .candidate-edit-row');
    rows.forEach((row, i) => {
      const name = row.querySelector('.cand-name').value;
      const url = row.querySelector('.cand-url').value;
      if (currentGitHubData.candidates[i]) {
        currentGitHubData.candidates[i].name = name;
        currentGitHubData.candidates[i].url = url;
      }
    });
    currentGitHubData.candidates = currentGitHubData.candidates.filter(c => c.name.trim() !== '' || c.url.trim() !== '');
    
    if (await saveToGitHub("Update candidates")) {
      renderCandidates();
      showScreen('candidate-list-screen');
    }
  };

  /* -------------------------------------------------------------------------- */
  /* メモ一覧・保存・ツリー                           */
  /* -------------------------------------------------------------------------- */
  function getSelectedEditNode() {
    const currentChildren = getChildren(currentGitHubData.folders, treeState.editPath);
    return currentChildren.find(node => node === editSelection?.node) || null;
  }

  function updateEditSelectionSummary() {
    const banner = document.getElementById('edit-selection-summary');
    const node = getSelectedEditNode();
    if (!node) {
      banner.textContent = '行を押すと名前変更できます。移動は各行の「移動」から始めます。';
      document.getElementById('edit-name-input').value = '';
      return;
    }
    banner.textContent = `選択中: ${node.type === 'folder' ? 'フォルダ' : 'メモ'} / ${node.name}`;
    document.getElementById('edit-name-input').value = node.name;
  }

  function updatePendingMoveSummary() {
    const summary = document.getElementById('move-pending-summary');
    const moveHereBtn = document.getElementById('edit-move-here');
    const cancelMoveBtn = document.getElementById('edit-cancel-move');
    const sourceChildren = pendingMove ? getChildren(currentGitHubData.folders, pendingMove.sourcePath) : [];
    const stillExists = pendingMove && sourceChildren.includes(pendingMove.node);

    if (!stillExists) {
      pendingMove = null;
    }

    if (!pendingMove) {
      summary.style.display = 'none';
      moveHereBtn.style.display = 'none';
      cancelMoveBtn.style.display = 'none';
      return;
    }

    summary.style.display = 'block';
    moveHereBtn.style.display = 'inline-block';
    cancelMoveBtn.style.display = 'inline-block';
    summary.textContent = `移動中: ${pendingMove.node.name} / 現在の移動先 ${pathToLabel(treeState.editPath)} で「ここに移動」を押してください。`;
  }

  function renderListView() {
    const container = document.getElementById('memo-tree-view');
    const tempDiv = document.getElementById('temp-memo-item');
    const currentPath = treeState.viewPath;
    document.getElementById('memo-list-path').textContent = `現在のフォルダ: ${pathToLabel(currentPath)}`;
    container.innerHTML = '';

    if (currentPath.length > 0) {
      container.appendChild(createTreeItem({
        iconClass: 'folder-icon',
        iconText: '↩',
        title: '上の階層へ',
        onMainClick: () => {
          currentPath.pop();
          renderListView();
        }
      }));
    }

    const children = getChildren(currentGitHubData.folders, currentPath);
    if (children.length === 0) {
      container.textContent = 'このフォルダは空です。';
    } else {
      children.forEach((node) => {
        if (node.type === 'folder') {
          container.appendChild(createTreeItem({
            iconClass: 'folder-icon',
            iconText: '📁',
            title: node.name,
            meta: `${node.children.length}件`,
            onMainClick: () => {
              currentPath.push(node.name);
              renderListView();
            }
          }));
        } else {
          container.appendChild(createTreeItem({
            iconClass: 'memo-icon',
            iconText: '📋️',
            title: node.name,
            meta: `${formatCountValue(calculateCharCount(node.content || ''))}文字`,
            onMainClick: () => openTextInEditor(node.content || '', node.name)
          }));
        }
      });
    }

    if (currentGitHubData.tempMemo) {
      tempDiv.style.opacity = '1';
      tempDiv.style.pointerEvents = 'auto';
      tempDiv.onclick = () => openTextInEditor(currentGitHubData.tempMemo, '一時メモ');
    } else {
      tempDiv.style.opacity = '0.5';
      tempDiv.style.pointerEvents = 'none';

  document.getElementById('btn-edit-mode').onclick = () => {

    renderEditTree();
    showScreen('list-edit-ui');

  function renderEditTree() {
    const container = document.getElementById('memo-tree-edit');
    const currentPath = treeState.editPath;
    document.getElementById('memo-edit-path').textContent = `現在のフォルダ: ${pathToLabel(currentPath)}`;
    container.innerHTML = '';
    updateEditSelectionSummary();
    updatePendingMoveSummary();

    if (currentPath.length > 0) {
      container.appendChild(createTreeItem({
        iconClass: 'folder-icon',
        iconText: '↩',
        title: '上の階層へ',
        onMainClick: () => {
          currentPath.pop();
          editSelection = null;
          renderEditTree();
        }
      }));
    }

    const children = getChildren(currentGitHubData.folders, currentPath);
    if (children.length === 0) {
      container.textContent = 'このフォルダは空です。';
      return;
    }

    children.forEach((node) => {
      container.appendChild(createTreeItem({
        iconClass: node.type === 'folder' ? 'folder-icon' : 'memo-icon',
        iconText: node.type === 'folder' ? '📁' : '📋️',
        title: node.name,
        meta: node.type === 'folder'
          ? `${node.children.length}件`
          : `${formatCountValue(calculateCharCount(node.content || ''))}文字`,
        selected: editSelection?.node === node,
        onMainClick: () => {
          editSelection = { node };
          updateEditSelectionSummary();
          renderEditTree();
        },
        actions: [
          {
            label: '開く',
            onClick: () => {
              if (node.type === 'folder') {
                currentPath.push(node.name);
                editSelection = null;
                renderEditTree();
              } else {
                openTextInEditor(node.content || '', node.name);
              }
            }
          },
          {
            label: 'コピー',
            onClick: () => {
              const siblings = getChildren(currentGitHubData.folders, currentPath);
              const copied = cloneNode(node);
              copied.name = createCopyName(siblings, node.name);
              siblings.push(copied);
              renderEditTree();
            }
          },
          {
            label: '削除',
            onClick: () => {
              if (!confirm(`「${node.name}」を削除しますか？`)) return;
              const siblings = getChildren(currentGitHubData.folders, currentPath);
              const index = siblings.indexOf(node);
              if (index >= 0) siblings.splice(index, 1);
              if (editSelection?.node === node) editSelection = null;
              if (pendingMove?.node === node) pendingMove = null;
              renderEditTree();
            }
          },
          {
            label: '移動',
            onClick: () => {
              pendingMove = { sourcePath: [...currentPath], node };
              updatePendingMoveSummary();
              renderEditTree();
            }
          }
        ]
      }));
    });
  }

  document.getElementById('edit-up-folder').onclick = () => {
    if (treeState.editPath.length === 0) return;
    treeState.editPath.pop();
    editSelection = null;
    renderEditTree();
  };

  document.getElementById('edit-new-folder').onclick = () => {
    const name = prompt('新しいフォルダ名');
    if (!name) return;
    const children = getChildren(currentGitHubData.folders, treeState.editPath);
    children.push({ type: 'folder', name: makeUniqueName(children, name), children: [] });
    renderEditTree();
  };

  document.getElementById('edit-rename').onclick = () => {
    const node = getSelectedEditNode();
    if (!node) return alert("変更したい項目を選択してください");
    const newName = document.getElementById('edit-name-input').value.trim();
    if (!newName) return alert("名前を入力してください");
    const siblings = getChildren(currentGitHubData.folders, treeState.editPath);
    node.name = makeUniqueName(siblings, newName, node);
    renderEditTree();
  };

  document.getElementById('edit-move-here').onclick = () => {
    if (!pendingMove) return;
    const sourceChildren = getChildren(currentGitHubData.folders, pendingMove.sourcePath);
    const sourceIndex = sourceChildren.indexOf(pendingMove.node);
    const destinationChildren = getChildren(currentGitHubData.folders, treeState.editPath);

    if (sourceIndex < 0) {
      pendingMove = null;
      renderEditTree();
      return;
    }
    if (sourceChildren === destinationChildren) {
      alert('同じフォルダには移動できません');
      return;
    }
    if (pendingMove.node.type === 'folder') {
      const ownPath = [...pendingMove.sourcePath, pendingMove.node.name];
      const movingIntoSelf = treeState.editPath.length >= ownPath.length
        && ownPath.every((segment, index) => treeState.editPath[index] === segment);
      if (movingIntoSelf) {
        alert('フォルダ自身の中には移動できません');
        return;
      }
    }

    sourceChildren.splice(sourceIndex, 1);
    pendingMove.node.name = makeUniqueName(destinationChildren, pendingMove.node.name);
    destinationChildren.push(pendingMove.node);
    if (editSelection?.node === pendingMove.node) editSelection = null;
    pendingMove = null;
    renderEditTree();
  };

  document.getElementById('edit-cancel-move').onclick = () => {
    pendingMove = null;
    renderEditTree();
  };

  document.getElementById('list-save-btn').onclick = async () => {
    if (await saveToGitHub("Update structure")) {
      treeState.viewPath = [...treeState.editPath];
      renderListView();
      showScreen('list-screen');
    }
  };

  /* -------------------------------------------------------------------------- */
  /* メモ保存機能                                   */
  /* -------------------------------------------------------------------------- */
  function renderSaveTree() {
    const container = document.getElementById('save-tree-view');
    const currentPath = treeState.savePath;
    document.getElementById('save-path-label').textContent = `現在の保存先: ${pathToLabel(currentPath)}`;
    container.innerHTML = '';

    if (currentPath.length > 0) {
      container.appendChild(createTreeItem({
        iconClass: 'folder-icon',
        iconText: '↩',
        title: '上の階層へ',
        onMainClick: () => {
          currentPath.pop();
          renderSaveTree();
        }
      }));
    }

    const children = getChildren(currentGitHubData.folders, currentPath);
    if (children.length === 0) {
      container.textContent = 'このフォルダは空です。';
      return;
    }

    children.forEach((node) => {
      if (node.type === 'folder') {
        container.appendChild(createTreeItem({
          iconClass: 'folder-icon',
          iconText: '📁',
          title: node.name,
          meta: `${node.children.length}件`,
          onMainClick: () => {
            currentPath.push(node.name);
            renderSaveTree();
          }
        }));
      } else {
        container.appendChild(createTreeItem({
          iconClass: 'memo-icon',
          iconText: '📋️',
          title: node.name,
          meta: 'この名前で上書きできます',
          onMainClick: () => {
            document.getElementById('save-title').value = node.name;
          }
        }));
      }
    });
  }

  document.getElementById('btn-memo-save').onclick = async () => {
    if (await fetchGitHubData()) {
      treeState.savePath = [];
      document.getElementById('save-title').value = titleInput.value;
      renderSaveTree();
      showScreen('save-screen');
    }
  };

  document.getElementById('save-up-folder').onclick = () => {
    if (treeState.savePath.length === 0) return;
    treeState.savePath.pop();
    renderSaveTree();
  };

  document.getElementById('save-new-folder').onclick = () => {
    const name = prompt('新しいフォルダ名');
    if (!name) return;
    const children = getChildren(currentGitHubData.folders, treeState.savePath);
    children.push({ type: 'folder', name: makeUniqueName(children, name), children: [] });
    renderSaveTree();
  };

  document.getElementById('do-save-memo').onclick = async () => {
    const title = document.getElementById('save-title').value.trim();
    if (!title) return alert("タイトルを入力してください");
    const folder = getFolder(currentGitHubData.folders, treeState.savePath);
    if (!folder.children) folder.children = [];
    
    const existingIdx = folder.children.findIndex(c => c.type === 'memo' && c.name === title);
    if (existingIdx >= 0) {
      if (!confirm("同じタイトル名のメモがあります。上書き保存しますか？")) return;
      folder.children[existingIdx].content = getText();
    } else {
      folder.children.push({ type: 'memo', name: title, content: getText() });
    }
    
    if (await saveToGitHub(`Save memo: ${title}`)) {
      alert("保存しました");
      titleInput.value = title;
      document.title = title;
      closePanel();
    }
  };

  document.getElementById('do-save-temp').onclick = async () => {
    currentGitHubData.tempMemo = getText();
    if (await saveToGitHub("Update temp memo")) {
      alert("一時保存しました");
      closePanel();
    }
  };

  /* -------------------------------------------------------------------------- */
  /* その他 / 実行 / +ボタン                           */
  /* -------------------------------------------------------------------------- */
  document.getElementById('clear').onclick=()=>{
    setText(''); 
    updateHistory('');
    titleInput.value='';
    document.title = "メモ帳 3.0";
  };
  document.getElementById('undo').onclick=()=>{if(currentStep>0){currentStep--;setText(history[currentStep]);}};
  document.getElementById('redo').onclick=()=>{if(currentStep<history.length-1){currentStep++;setText(history[currentStep]);}};

  document.getElementById('do-exec').onclick = () => {
    const type = document.getElementById('exec-type').value;
    let code = "";
    if (isEditorMode && aceEditor) {
      code = aceEditor.getSelectedText() || aceEditor.getValue();
    } else {
      const sel = window.getSelection();
      code = (sel.rangeCount && !sel.isCollapsed && memo.contains(sel.anchorNode)) ? sel.toString() : memo.innerText;
    }

    if (type === 'js') {
      try { new Function(code)(); } catch(e) { alert(e); }
    } else {
      const w = window.open();
      const content = type === 'md' ? marked.parse(code) : code;
      w.document.write(content);
      w.document.close();
    }
  };

  document.getElementById('open-url').onclick = () => {
    window.open('https://gadget-otaku.github.io/Bookmarklet/HTML%E5%88%B6%E4%BD%9C/%E3%83%A1%E3%83%A2%E5%B8%B33.0', '_blank');
  };

  // エスケープ関数
  function escapeHTML(s) { return s.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#039;'}[m])); }
  function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

}); // End DOMContentLoaded
</script>
</body>
</html>
